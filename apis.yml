created: '2026-05-11'
modified: '2026-05-11'
specificationVersion: '0.19'
apis:
  - aid: ifttt:webhooks-api
    name: IFTTT Maker Webhooks API
    description: >-
      Public HTTP API for triggering IFTTT Applets from any device or
      service by sending GET or POST requests to a per-user trigger URL.
      Supports up to three positional values per call or arbitrary JSON
      payloads on the `/json` variant. Authentication uses a personal
      Webhooks key embedded in the URL path.
    humanURL: https://ifttt.com/maker_webhooks
    baseURL: https://maker.ifttt.com
    tags:
      - Webhooks
      - Automation
      - Triggers
      - No-Code
    properties:
