aid: ifttt
name: IFTTT
description: >-
  IFTTT (If This Then That) is a consumer and prosumer automation
  platform that connects more than 750 apps, devices, and services
  through conditional Applets that chain triggers to actions. The IFTTT
  Maker Webhooks service exposes a public HTTP API that lets developers
  fire triggers and execute Applets from any internet-connected device
  using a personal Webhooks key for authentication, with both
  form-encoded and JSON payload variants supported.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - Automation
  - Webhooks
  - iPaaS
  - No-Code
  - Smart Home
  - IoT
url: >-
